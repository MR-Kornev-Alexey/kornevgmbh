
services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./static-html:/var/www/static:ro   # добавляем монтирование статики
    depends_on:
     - frontend
     - backend
     - audit-frontend
    restart: unless-stopped
    networks:
     - app-network

  frontend:
    build: ./frontend
    container_name: nextjs-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  audit-frontend:
    build:
      context: ./audit-form-frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: audit-form-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: nestjs-backend
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - app-network

  # PostgreSQL – база данных для backend и CloudBeaver
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biveruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
      POSTGRES_DB: ${POSTGRES_DB:-biverdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biveruser} -d ${POSTGRES_DB:-biverdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CloudBeaver – веб-интерфейс для PostgreSQL (альтернатива pgAdmin)
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    restart: unless-stopped
    environment:
      - CB_SERVER_NAME=CloudBeaver
      - CB_SERVER_PORT=8978
      - PROXY_TYPE=nginx
      - CB_SERVER_URL=http://localhost/cloudbeaver   # важно! указывает публичный адрес
      - CB_API_BASE=/cloudbeaver/api                  # чтобы API искал по правильному пути
      - CB_HOST=0.0.0.0
      - CB_PORT=8978
      # Можно передать предустановленные соединения (опционально)
      - CB_DATABASE_DRIVER=postgresql
      - CB_DATABASE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-biverdb}
      - CB_DATABASE_USER=${POSTGRES_USER:-biveruser}
      - CB_DATABASE_PASSWORD=${POSTGRES_PASSWORD:-strongpassword}
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    ports:
      - "8978:8978"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

# Добавляем новые volumes в конец файла (на том же уровне, что и networks)
volumes:
  postgres_data:
  cloudbeaver_data:

networks:
  app-network:
    driver: bridge   # у вас уже есть